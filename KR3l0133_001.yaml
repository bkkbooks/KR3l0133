body:
  text: 古今善言日南張重舉計入洛正旦大會明帝問日南郡北向視日邪重曰今郡有雲中金城者不必皆有其實日亦俱出于東耳至于風氣暄暖日影仰當官民居止隨情面向東西南北迴背無定人性凶悍果于戰鬭便山習水不閑平地古人云五嶺天地以隔內外況綿途于海表顧九嶺而彌邈非復行路之逕阻信幽荒之冥域者矣酈道元水經注卷三十六靈帝時欲用羊續為三司而中官求其賂續出黃紙補袍以示使者時人謠曰天下清苦羊續祖桓鸞字始春焉弟也少立志行綿袍糟食不求盈餘以濁世恥不肯仕太平御覽卷六百九十三
  hash: sha256:8b90141ae4def52f2109a661ae5bb75c508f46813a0d3d60ce37ba49b9a653ed
